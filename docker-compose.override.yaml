# Development overrides - automatically loaded by Docker Compose
# To run without dev mode: docker compose -f docker-compose.yaml up
services:
  app:
    environment:
      - APP_DEV_MODE=true
    volumes:
      - ./app:/app/app:ro

  # Development-only database admin interface
  # Run with: make mongo-express
  mongo-express:
    image: mongo-express
    profiles:
      - dev
    ports:
      - "${MONGO_EXPRESS_EXTERNAL_PORT:-8081}:8081"
    healthcheck:
      test: "curl --fail http://localhost:8081"
      interval: 2s
      timeout: 20s
      retries: 10
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_ADMINUSERNAME=hacktheeast
      - ME_CONFIG_MONGODB_ADMINPASSWORD=hacktheeast
    depends_on:
      mongodb:
        condition: service_healthy
